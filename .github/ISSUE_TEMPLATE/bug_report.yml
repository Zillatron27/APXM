name: Bug Report
description: Something isn't working right
labels: ["bug", "tester-feedback"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong. Screenshots are very welcome.
      placeholder: "e.g. Fleet panel shows ship at wrong location after jump completes"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: "e.g. Ship should update to destination system after arrival"
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce (if known)
      placeholder: |
        1. Open fleet panel (F key)
        2. Watch ship in transit
        3. After arrival, location doesn't update
    validations:
      required: false
  - type: dropdown
    id: view
    attributes:
      label: Where did this happen?
      options:
        - Desktop View (galaxy map)
        - Mobile View
        - Both
        - Not sure
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser & version
      placeholder: "e.g. Chrome 134, Firefox 142"
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: APXM version
      description: Shown in the header (mobile) or menu (desktop)
      placeholder: "e.g. v0.2.0-beta1"
    validations:
      required: false
